<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#84CC16" />
    <link rel="manifest" href="/manifest.json" />
    <title>CareRefill Adherence Coordinator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('CareRefill Service Worker registered successfully', reg.scope))
            .catch(err => console.log('CareRefill Service Worker registration failed', err));
        });
      }
    </script>
  </body>
</html>
